<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Müqəddəs Quran — Multilingual</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">
  <div class="stars-bg" id="stars"></div>
  <div class="intro-moon"></div>
  <div class="intro-arabic">ٱلسَّلَامُ عَلَيْكُمْ</div>
  <div class="intro-divider"><span></span><i></i><span></span></div>
  <div class="intro-latin">Peace be upon you</div>
  <button class="intro-btn" onclick="openApp()"><span>Quranı Aç ✦</span></button>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">القرآن الكريم</div>
      <div class="topbar-info" id="langDisplay">AZƏRBAYCAN DİLİNDƏ</div>
    </div>
    <div class="topbar-badge">Kitabı Aç</div>
  </div>
  <div class="stage" id="stage">
    <div class="dust" id="dustLayer"></div>
    <div class="book-3d" id="book3d" onclick="openReader()">
      <div class="book-spine"><div class="spine-label">Holy Quran</div></div>
      <div class="book-cover">
        <div class="cover-frame"></div>
        <svg class="c-mandala" viewBox="0 0 120 120">
          <polygon points="60,10 65,45 100,36 74,60 100,84 65,75 60,110 55,75 20,84 46,60 20,36 55,45" fill="none" stroke="var(--gold)" stroke-width="0.8"/>
        </svg>
        <div class="cover-quran-text">القرآن</div>
        <div class="cover-tap-hint">Toxunun</div>
      </div>
    </div>
  </div>
</div>

<div id="reader">
  <div class="reader-header">
    <div class="btn-close" onclick="closeReader()">✕</div>
    <select class="lang-selector" id="langSelect" onchange="changeLanguage(this.value)">
      <option value="az.sultanov">AZƏRBAYCAN</option>
      <option value="quran-uthmani">ARABIC (Original)</option>
      <option value="tr.diyanet">TÜRKÇE</option>
      <option value="en.sahih">ENGLISH</option>
      <option value="ru.kuliev">RUSSIAN</option>
      <option value="de.aburida">DEUTSCH</option>
      <option value="fr.hamidullah">FRANÇAIS</option>
      <option value="es.cortes">ESPAÑOL</option>
      <option value="ja.japanese">JAPANESE</option>
      <option value="zh.jian">CHINESE</option>
    </select>
    <div id="rSurahName" style="color:var(--gold); font-family:'Cinzel',serif; font-size:10px;">SURAH</div>
  </div>
  <div class="surah-panel">
    <div class="surah-chips-wrap" id="surahChips"></div>
  </div>
  <div class="page-spread-wrap" id="spreadWrap">
    <div class="book-page" id="bookPage">
      <div class="surah-banner" id="pageBanner">Fatihə</div>
      <div class="ayahs-container">
        <div class="page-text" id="pageText">Yüklənir...</div>
      </div>
    </div>
  </div>
  <div class="reader-footer">
    <button class="nav-btn" onclick="prevPage()">◂ Geri</button>
    <button class="nav-btn" onclick="nextPage()">İrəli ▸</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

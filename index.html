<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Müqəddəs Quran — Multilingual</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">
  <div class="stars-bg" id="stars"></div>
  <div class="intro-moon"></div>
  <div class="intro-arabic">Əssələmu Əleykum</div>
  <div class="intro-divider"><span></span><i></i><span></span></div>
  <div class="intro-latin">Müqəddəs Quran</div>
  <button class="intro-btn" onclick="openApp()"><span>Daxil Ol ✦</span></button>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">QURAN-I KƏRİM</div>
      <div class="topbar-info" id="topInfo">Tərcümə seçilməyib</div>
    </div>
    <div class="lang-selector">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="az.mammadaliyev">🇦🇿 Azərbaycan</option>
            <option value="tr.diyanet">🇹🇷 Türkçe</option>
            <option value="ru.kuliev">🇷🇺 Русский</option>
            <option value="en.sahih">🇺🇸 English</option>
            <option value="de.aburida">🇩🇪 Deutsch</option>
        </select>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="dust" id="dustLayer"></div>
    <div class="book-3d" id="book3d" onclick="openReader()">
      <div class="book-spine"><div class="spine-label">HOLY QURAN</div></div>
      <div class="book-pages-stack"></div>
      <div class="book-cover">
        <div class="cover-frame"></div>
        <svg class="c-mandala" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="56" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
          <polygon points="60,10 65,45 100,36 74,60 100,84 65,75 60,110 55,75 20,84 46,60 20,36 55,45" fill="none" stroke="var(--gold)" stroke-width="0.8"/>
          <circle cx="60" cy="60" r="6" fill="none" stroke="var(--gold)" stroke-width="0.8"/>
        </svg>
        <div class="cover-quran-text">QURAN</div>
        <div class="cover-tap-hint">Oxumaq üçün toxunun</div>
      </div>
    </div>
  </div>
</div>

<div id="reader">
  <div class="reader-header">
    <div class="reader-header-left">
      <div class="btn-close" onclick="closeReader()">✕</div>
      <div>
        <div class="reader-surah-name" id="rSurahName">—</div>
        <div class="reader-page-num" id="rPageNum">Səhifə 1</div>
      </div>
    </div>
    <div id="activeLangName" style="color:var(--gold); font-size: 12px; opacity: 0.7;">Azərbaycan</div>
  </div>

  <div class="surah-panel">
    <div class="surah-chips-wrap" id="surahChips"></div>
  </div>

  <div class="page-spread-wrap">
    <div class="book-page">
      <div class="surah-banner">
        <div class="surah-banner-name" id="pageBannerName">—</div>
      </div>
      <div class="ayahs-container" id="ayahsContainer">
        <div class="page-text" id="pageText">Yüklənir...</div>
      </div>
      <div class="page-num-bottom" id="pageNumBottom">— 1 —</div>
    </div>
  </div>

  <div class="reader-footer">
    <button class="nav-btn" onclick="prevPage()">◂ Geri</button>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <button class="nav-btn" onclick="nextPage()">İrəli ▸</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

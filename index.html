<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Müqəddəs Quran — Azərbaycan Dilində</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --dark: #09090f;
  --page-bg: #f9f3e8;
  --ink: #1a1008;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--dark);overflow:hidden;font-family:'Amiri',serif;touch-action:manipulation}

/* GİRİŞ EKRANI */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 40%,#0d2a1c 0%,#07080f 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s ease;
}
#intro.hide{opacity:0;pointer-events:none}
.intro-arabic{font-size:30px;color:var(--gold);text-align:center;direction:rtl;margin-bottom:10px}
.intro-latin{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:2px;text-align:center}
.intro-btn{
  margin-top:30px;padding:12px 35px;background:transparent;border:1px solid var(--gold);
  color:var(--gold);cursor:pointer;font-family:'Cinzel',serif;letter-spacing:3px;text-transform:uppercase;
}

/* ƏSAS TƏTBİQ */
#app{display:none;position:fixed;inset:0;flex-direction:column;background:var(--dark)}
#app.show{display:flex}
.topbar{padding:15px;border-bottom:1px solid rgba(201,168,76,0.15);display:flex;justify-content:space-between;align-items:center}
.topbar-title{color:var(--gold);font-size:20px}

/* OXU PANELİ */
#reader{display:none;position:fixed;inset:0;z-index:100;background:#0a0a0f;flex-direction:column}
#reader.show{display:flex}
.reader-header{padding:10px 15px;border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;gap:15px}
.btn-close{color:var(--gold);font-size:24px;cursor:pointer}
.reader-surah-name{color:var(--gold);font-size:18px}

.surah-panel{background:#07080f;padding:10px;display:flex;gap:10px;overflow-x:auto;border-bottom:1px solid rgba(201,168,76,0.1)}
.surah-chip{padding:5px 15px;border:1px solid var(--gold);color:var(--gold);border-radius:20px;white-space:nowrap;cursor:pointer;font-size:14px}

.page-spread-wrap{flex:1;position:relative;display:flex;justify-content:center;padding:10px;overflow:hidden}
.book-page{
  width:100%;max-width:500px;background:var(--page-bg);border-radius:8px;
  padding:20px;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.ayahs-container{flex:1;overflow-y:auto;padding-right:5px}
.page-text{direction:rtl;text-align:right}

/* AYƏ VƏ TƏRCÜMƏ ÜSLUBU */
.ayah-box{margin-bottom:25px;border-bottom:1px dashed rgba(0,0,0,0.1);padding-bottom:15px}
.ar-text{font-size:24px;line-height:1.8;color:var(--ink);margin-bottom:10px}
.az-text{direction:ltr;text-align:left;font-family:sans-serif;font-size:16px;color:#333;line-height:1.5}
.ayah-num{color:var(--gold);font-weight:bold;margin-left:5px}

.reader-footer{padding:15px;display:flex;justify-content:space-between;background:#07080f}
.nav-btn{padding:10px 25px;background:var(--gold);border:none;border-radius:5px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<div id="intro">
  <div class="intro-arabic">ٱلسَّلَامُ عَلَيْكُمْ</div>
  <div class="intro-latin">Müqəddəs Quran</div>
  <button class="intro-btn" onclick="openApp()">Oxumağa Başla</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">Müqəddəs Quran</div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <button class="intro-btn" onclick="openReader()">Kitabı Aç</button>
  </div>
</div>

<div id="reader">
  <div class="reader-header">
    <div class="btn-close" onclick="closeReader()">✕</div>
    <div class="reader-surah-name" id="rSurahName">Yüklənir...</div>
  </div>

  <div class="surah-panel" id="surahChips"></div>

  <div class="page-spread-wrap">
    <div class="book-page">
      <div class="ayahs-container" id="ayahsContainer">
        <div id="pageText">Surə seçin...</div>
      </div>
    </div>
  </div>

  <div class="reader-footer">
    <button class="nav-btn" onclick="prevPage()">Geri</button>
    <button class="nav-btn" onclick="nextPage()">İrəli</button>
  </div>
</div>

<script>
const SURAH_META = [
  [1,"Fatihə"],[2,"Bəqərə"],[3,"Ali-İmran"],[4,"Nisa"],[5,"Maidə"],[6,"Ənam"],[7,"Əraf"],[112,"İxlas"],[113,"Fələq"],[114,"Nas"]
];

let currentSurahNum = 1;
let currentPage = 0;
let QURAN_CACHE = {};
const AYAHS_PER_PAGE = 5;

function openApp() {
  document.getElementById('intro').classList.add('hide');
  setTimeout(() => { document.getElementById('app').classList.add('show'); }, 500);
}

function openReader() {
  document.getElementById('reader').classList.add('show');
  buildChips();
  loadSurah(1, 0);
}

function closeReader() { document.getElementById('reader').classList.remove('show'); }

function buildChips() {
  const wrap = document.getElementById('surahChips');
  wrap.innerHTML = '';
  SURAH_META.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'surah-chip';
    chip.innerText = m[1];
    chip.onclick = () => loadSurah(m[0], 0);
    wrap.appendChild(chip);
  });
}

async function loadSurah(num, page) {
  currentSurahNum = num;
  currentPage = page;
  document.getElementById('pageText').innerHTML = "Yüklənir...";
  
  try {
    let data;
    if (QURAN_CACHE[num]) {
      data = QURAN_CACHE[num];
    } else {
      const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,az.mammadaliyev`);
      const json = await res.json();
      data = json.data;
      QURAN_CACHE[num] = data;
    }
    render(data);
  } catch (e) {
    document.getElementById('pageText').innerHTML = "Xəta baş verdi.";
  }
}

function render(data) {
  const arAyahs = data[0].ayahs;
  const azAyahs = data[1].ayahs;
  document.getElementById('rSurahName').innerText = data[0].englishName;

  const start = currentPage * AYAHS_PER_PAGE;
  const end = start + AYAHS_PER_PAGE;
  const sliceAr = arAyahs.slice(start, end);
  const sliceAz = azAyahs.slice(start, end);

  let html = '';
  sliceAr.forEach((ayə, i) => {
    html += `
      <div class="ayah-box">
        <div class="ar-text">${ayə.text} <span class="ayah-num">(${start + i + 1})</span></div>
        <div class="az-text"><strong>${start + i + 1}.</strong> ${sliceAz[i].text}</div>
      </div>
    `;
  });

  document.getElementById('pageText').innerHTML = html || "Surənin sonu.";
}

function nextPage() { currentPage++; loadSurah(currentSurahNum, currentPage); }
function prevPage() { if(currentPage > 0) { currentPage--; loadSurah(currentSurahNum, currentPage); } }
</script>

</body>
</html>
